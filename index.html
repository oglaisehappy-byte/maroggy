<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maroggy Fabrications</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1a5f7a; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: #eef6f9; color: var(--primary); border: 1px dashed var(--primary); }
        .btn-generate { background: var(--primary); color: white; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #eee; padding: 5px; }
        td { padding: 8px 5px; border-bottom: 1px solid #f9f9f9; }
        .total-row { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Customer Info</h2>
        <label>Client Name</label>
        <input type="text" id="client" placeholder="e.g. Lusaka City Council">
    </div>

    <div class="card">
        <h2>Add Items</h2>
        <label>Description</label>
        <input type="text" id="itemDesc" placeholder="e.g. Bronze Sliding Window">
        <label>Quantity / Sqm</label>
        <input type="number" id="itemQty" placeholder="0.00">
        <label>Unit Rate (ZMW)</label>
        <input type="number" id="itemRate" placeholder="0.00">
        <button class="btn btn-add" onclick="addItem()">+ Add Item to List</button>

        <table id="previewTable">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="itemList"></tbody>
        </table>
        
        <div id="grandTotalDisplay" style="text-align: right; margin-top: 10px; font-weight: bold;"></div>
        
        <button class="btn btn-generate" onclick="generatePDF()">Generate Final Quotation</button>
    </div>

    <script>
    let items = [];

    function addItem() {
        const desc = document.getElementById('itemDesc').value;
        const qty = parseFloat(document.getElementById('itemQty').value);
        const rate = parseFloat(document.getElementById('itemRate').value);

        if (!desc || isNaN(qty) || isNaN(rate)) {
            alert("Please fill in all item fields");
            return;
        }

        const total = qty * rate;
        items.push({ desc, qty, rate, total });

        document.getElementById('itemDesc').value = '';
        document.getElementById('itemQty').value = '';
        document.getElementById('itemRate').value = '';
        updatePreview();
    }

    function updatePreview() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        let grandTotal = 0;
        items.forEach((item) => {
            grandTotal += item.total;
            list.innerHTML += `<tr><td>${item.desc}</td><td>${item.qty}</td><td>${item.total.toLocaleString()}</td></tr>`;
        });
        document.getElementById('grandTotalDisplay').innerText = `Grand Total: ZMW ${grandTotal.toLocaleString()}`;
    }

    async function generatePDF() {
        if (items.length === 0) { alert("Add at least one item first!"); return; }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const client = document.getElementById('client').value || "Valued Customer";
        
        // 1. ADD LOGO (Top Left)
        // Parameters: (data, type, x, y, width, height)
        try {
            doc.addImage(LOGO_BASE64, 'PNG', 14, 10, 30, 30); 
        } catch (e) {
            console.error("Logo failed to load. Check if your Base64 string is correct.");
        }

        // 2. COMPANY DETAILS (Top Right)
        doc.setFontSize(18);
        doc.setTextColor(26, 95, 122);
        doc.text("MAROGGY ALUMINIUM", 50, 20); // Moved right to clear logo
        
        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text("chingwere turn-off, along Great North Road,", 50, 26); // Change to your actual address
        doc.text("Lusaka, Zambia", 50, 30);
        doc.text("Phone: +260970110096", 50, 34);
        doc.text("Email: maroggyaluminium@gmail.com", 50, 38);

        doc.line(14, 45, 196, 45); // Thick separator line

        // 3. QUOTATION INFO
        doc.setFontSize(11);
        doc.setTextColor(0);
        doc.text(`QUOTATION FOR: ${client.toUpperCase()}`, 14, 55);
        doc.text(`DATE: ${new Date().toLocaleDateString()}`, 150, 55);

        // 4. ITEMS TABLE
        const tableBody = items.map(i => [i.desc, i.qty.toString(), i.rate.toLocaleString(), i.total.toLocaleString()]);
        const grandTotal = items.reduce((sum, i) => sum + i.total, 0);

        doc.autoTable({
            startY: 65,
            head: [['Description', 'Qty/Sqm', 'Rate (ZMW)', 'Total (ZMW)']],
            body: tableBody,
            foot: [['', '', 'GRAND TOTAL', `ZMW ${grandTotal.toLocaleString()}`]],
            theme: 'grid',
            headStyles: { fillColor: [26, 95, 122], textColor: [255, 255, 255] },
            footStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' }
        });

        // 5. BANKING DETAILS (Bottom)
        const finalY = doc.lastAutoTable.finalY + 15;
        doc.setFontSize(11);
        doc.text("OFFICIAL PAYMENT DETAILS:", 14, finalY);
        doc.setFontSize(10);
        doc.text("Bank: Standard Chartered", 14, finalY + 8);
        doc.text("Acc No:0104308073100", 14, finalY + 14);
        doc.text("Airtel Money: [0970110096]", 14, finalY + 20);

        doc.save(`QUOTATION_${client}.pdf`);
        
        // Reset
        items = [];
        updatePreview();
        document.getElementById('client').value = '';
    }
</script>
